<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Video Test</title></head>
<body style="margin:0;background:#000;color:white;font-family:monospace">
  <div id="log" style="position:fixed;top:20px;left:20px;z-index:99;font-size:13px;background:rgba(0,0,0,.8);padding:12px;max-width:400px;line-height:1.8"></div>
  <video
    id="v"
    autoplay
    muted
    playsinline
    loop
    preload="auto"
    src="/assets/pages/home/home-hero.mp4?v=2"
    style="width:100%;height:100vh;object-fit:cover"
  ></video>
  <script>
    const v = document.getElementById('v');
    const log = document.getElementById('log');
    const now = () => performance.now().toFixed(0) + 'ms';
    const add = (msg) => { log.innerHTML += now() + ' ' + msg + '<br>'; };

    add('init rs=' + v.readyState);
    v.addEventListener('playing', () => add('✅ playing'));
    v.addEventListener('pause',   () => add('⏸ pause'));
    v.addEventListener('waiting', () => add('⏳ waiting'));
    v.addEventListener('canplay', () => {
      add('▶ canplay rs=' + v.readyState + ' paused=' + v.paused);
      if (v.paused && !v.ended) v.play().catch(e => add('❌ resume: ' + e.name));
    }, { once: true });
  </script>
</body>
</html>
